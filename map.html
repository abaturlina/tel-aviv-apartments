<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TA · Квартиры</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Inter, system-ui, sans-serif; background: #F5F5F5; }

/* ── Header ── */
header {
  background: #1A1A1A;
  color: #fff;
  padding: 12px 20px 0;
  position: sticky;
  top: 0;
  z-index: 500;
}
.header-row1 {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  padding-bottom: 10px;
}
.logo {
  font-size: 17px;
  font-weight: 800;
  color: #F5E642;
  letter-spacing: -0.03em;
  flex-shrink: 0;
}
.tabs {
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 3px;
  flex-shrink: 0;
}
.tab {
  padding: 5px 16px;
  border-radius: 6px;
  border: none;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: rgba(255,255,255,0.5);
  transition: all 0.15s;
}
.tab.active { background: #F5E642; color: #1A1A1A; }
.stats {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: auto;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  flex-wrap: wrap;
}
.stats b { color: #fff; font-weight: 700; }

.filters {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
  padding: 8px 0 10px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.filters select,
.filters input {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  color: #fff;
  padding: 4px 8px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  height: 28px;
  outline: none;
}
.filters select option { background: #222; }
.filters input { width: 80px; }
.filters input::placeholder { color: rgba(255,255,255,0.3); }
.btn-reset {
  background: #E8341C; border: none; color: #fff;
  padding: 0 12px; height: 28px; border-radius: 6px;
  font-family: inherit; font-size: 12px; font-weight: 700;
  cursor: pointer;
}
.btn-export {
  background: #F5E642; border: none; color: #1A1A1A;
  padding: 0 12px; height: 28px; border-radius: 6px;
  font-family: inherit; font-size: 12px; font-weight: 700;
  cursor: pointer; margin-left: auto;
}

/* ── Gallery — точно как card-test.html ── */
#gallery-view {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
@media (max-width: 1280px) { #gallery-view { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 860px)  { #gallery-view { grid-template-columns: repeat(2, 1fr); } }
#gallery-view.hidden { display: none; }

/* ── Map ── */
#map-view { background: #e0e0e0; }
#map-view.hidden { display: none; }
#map { width: 100%; }

/* ── Card — точная копия card-test.html ── */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
}
.card.liked { outline: 2px solid #F5E642; }

.card-photo {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  flex-shrink: 0;
  background: #e0e0e0;
}
.card-photo img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}
.card-photo .no-photo {
  width: 100%;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  opacity: 0.2;
  background: #e8e8e8;
}
.card-photo .prev,
.card-photo .next {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.92);
  border: none; border-radius: 50%;
  width: 32px; height: 32px;
  font-size: 20px; line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s;
  z-index: 3;
}
.card-photo .prev { left: 8px; }
.card-photo .next { right: 8px; }
.card:hover .card-photo .prev,
.card:hover .card-photo .next { opacity: 1; pointer-events: all; }
.photo-counter {
  position: absolute; bottom: 8px; right: 8px;
  background: rgba(0,0,0,0.5); color: #fff;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px;
  pointer-events: none; z-index: 3;
}
.btn-like, .btn-hide {
  position: absolute; top: 8px;
  width: 32px; height: 32px;
  border: none; border-radius: 50%;
  background: rgba(255,255,255,0.92);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  z-index: 4;
}
.btn-like { right: 46px; }
.btn-hide { right: 8px; }
.btn-like.liked { background: #F5E642; }
.btn-hide:hover { background: #fee2e2; color: #E8341C; }

.card-info {
  padding: 12px;
  background: white;
  color: #1A1A1A;
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
}
.card-price   { font-size: 18px; font-weight: 800; color: #1A1A1A; }
.card-address { font-size: 13px; color: #333; line-height: 1.4; }
.card-tags    { font-size: 12px; color: #777; }
.card-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.card-actions a {
  font-size: 12px; color: #444; text-decoration: none;
  padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px;
  white-space: nowrap;
}
.card-actions a:hover { border-color: #999; color: #111; }

/* ── Empty state ── */
.empty {
  grid-column: 1 / -1;
  padding: 80px 20px;
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,0.93);
  align-items: center; justify-content: center;
}
#lightbox.open { display: flex; }
#lb-img {
  max-width: 90vw; max-height: 85vh;
  object-fit: contain; border-radius: 6px;
  display: block;
}
.lb-close {
  position: fixed; top: 18px; right: 22px;
  background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3);
  color: #fff; width: 44px; height: 44px; border-radius: 50%;
  font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 9001;
}
.lb-arrow {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
  color: #fff; width: 54px; height: 54px; border-radius: 50%;
  font-size: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 9001;
}
#lb-prev { left: 18px; }
#lb-next { right: 18px; }
#lb-counter {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.7); font-size: 13px;
  background: rgba(0,0,0,0.5); padding: 4px 16px; border-radius: 12px;
  z-index: 9001; pointer-events: none;
}

/* ── Notice ── */
#notice {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #1A1A1A; color: #fff;
  padding: 10px 20px; border-radius: 8px;
  font-size: 13px; z-index: 8000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  display: none; max-width: 500px; text-align: center;
}

/* ── Map popup ── */
.leaflet-popup-content-wrapper {
  background: #1A1A1A; border-radius: 10px; padding: 0;
  min-width: 220px; max-width: 280px; color: #fff;
}
.leaflet-popup-content { margin: 12px; }
.leaflet-popup-tip { background: #1A1A1A; }
.popup-price { font-size: 16px; font-weight: 800; color: #F5E642; margin-bottom: 4px; }
.popup-addr  { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
.popup-tags  { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.popup-link  { font-size: 12px; color: #F5E642; text-decoration: none; }
.apt-pin { cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="header-row1">
    <div class="logo">TA·FLATS</div>
    <div class="tabs">
      <button class="tab active" id="tab-gallery" onclick="setView('gallery')">Галерея</button>
      <button class="tab"        id="tab-map"     onclick="setView('map')">Карта</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="filters">
    <select id="f-status" onchange="render()">
      <option value="">Все статусы</option>
      <option value="good">До 10k ₪</option>
      <option value="over_budget">10–15k ₪</option>
      <option value="new">Новые</option>
      <option value="interested">Понравилось</option>
      <option value="contacted">Связался</option>
    </select>
    <select id="f-source" onchange="render()">
      <option value="">Все источники</option>
      <option value="yad2">yad2</option>
      <option value="homeless">homeless</option>
      <option value="madlan">madlan</option>
      <option value="onmap">onmap</option>
      <option value="craigslist">craigslist</option>
      <option value="janglo">janglo</option>
      <option value="facebook">facebook</option>
    </select>
    <select id="f-rooms" onchange="render()">
      <option value="">Все комнаты</option>
      <option value="3">3 комн.</option>
      <option value="3.5">3.5 комн.</option>
      <option value="4">4 комн.</option>
    </select>
    <input id="f-price" type="number" placeholder="Цена до" oninput="render()">
    <input id="f-sqm"   type="number" placeholder="м² от"   oninput="render()">
    <select id="f-sort" onchange="render()">
      <option value="date">По дате ↓</option>
      <option value="price_asc">Цена ↑</option>
      <option value="price_desc">Цена ↓</option>
    </select>
    <button class="btn-reset" onclick="resetFilters()">Сбросить</button>
    <button class="btn-export" onclick="exportCSV()">↓ CSV</button>
  </div>
</header>

<div id="gallery-view"></div>
<div id="map-view" class="hidden"><div id="map"></div></div>

<!-- Lightbox -->
<div id="lightbox" onclick="if(event.target===this)lbClose()">
  <img id="lb-img" src="" alt="">
  <button class="lb-close" onclick="lbClose()">✕</button>
  <button class="lb-arrow" id="lb-prev" onclick="lbNav(-1)">‹</button>
  <button class="lb-arrow" id="lb-next" onclick="lbNav(1)">›</button>
  <div id="lb-counter"></div>
</div>

<div id="notice"></div>

<script>
var apts = [];
var PHOTOS = {};   // id → photos array
var PIDX   = {};   // id → current photo index
var lbId   = null; // current lightbox apt id
var lbIdx  = 0;
var view   = 'gallery';
var leafletMap = null, markers = null;

// ── Load data ─────────────────────────────────────────────────────────────────
fetch('apartments.json?' + Date.now())
  .then(function(r){ return r.json(); })
  .then(function(data){
    apts = data;
    render();
    setInterval(function(){
      fetch('apartments.json?' + Date.now())
        .then(function(r){ return r.json(); })
        .then(function(data){ apts = data; render(); });
    }, 30000);
  })
  .catch(function(){
    document.getElementById('gallery-view').innerHTML =
      '<div class="empty">apartments.json не найден. Запусти scraper.py</div>';
  });

// ── Filters ───────────────────────────────────────────────────────────────────
function getFilters() {
  return {
    status:   document.getElementById('f-status').value,
    source:   document.getElementById('f-source').value,
    rooms:    document.getElementById('f-rooms').value,
    price:    +document.getElementById('f-price').value || null,
    sqm:      +document.getElementById('f-sqm').value   || null,
    sort:     document.getElementById('f-sort').value,
  };
}

function filtered() {
  var f = getFilters();
  var list = apts.filter(function(a) {
    if (a.status === 'rejected') return false;
    if (f.status && a.status !== f.status) return false;
    if (f.source && a.source !== f.source) return false;
    if (f.rooms  && String(a.rooms) !== f.rooms) return false;
    if (f.price  && a.price > f.price) return false;
    if (f.sqm    && (a.size_sqm == null || a.size_sqm < f.sqm)) return false;
    return true;
  });
  if      (f.sort === 'price_asc')  list.sort(function(a,b){ return (a.price||99999)-(b.price||99999); });
  else if (f.sort === 'price_desc') list.sort(function(a,b){ return (b.price||0)-(a.price||0); });
  else list.sort(function(a,b){ return (b.added_at||'') > (a.added_at||'') ? 1 : -1; });
  return list;
}

function resetFilters() {
  ['f-status','f-source','f-rooms','f-sort'].forEach(function(id){
    document.getElementById(id).value = id === 'f-sort' ? 'date' : '';
  });
  ['f-price','f-sqm'].forEach(function(id){ document.getElementById(id).value = ''; });
  render();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  var vis    = filtered();
  var liked  = apts.filter(function(a){ return a.status === 'interested'; }).length;
  var prices = vis.filter(function(a){ return a.price; }).map(function(a){ return a.price; });
  var avg    = prices.length ? Math.round(prices.reduce(function(s,p){ return s+p; },0)/prices.length) : null;
  var src    = {};
  apts.forEach(function(a){ if (a.source) src[a.source] = (src[a.source]||0)+1; });
  var srcHtml = Object.entries(src).map(function(e){
    return e[0] + ' <b>' + e[1] + '</b>';
  }).join(' · ');
  document.getElementById('stats').innerHTML =
    'Всего: <b>' + vis.length + '</b>' +
    ' &nbsp;·&nbsp; Средняя: <b>' + (avg ? avg.toLocaleString('ru') + ' ₪' : '—') + '</b>' +
    ' &nbsp;·&nbsp; ♥ <b>' + liked + '</b>' +
    (srcHtml ? ' &nbsp;·&nbsp; ' + srcHtml : '');
}

// ── Card ──────────────────────────────────────────────────────────────────────
function makeCard(a) {
  var photos   = a.photos || [];
  PHOTOS[a.id] = photos;
  if (PIDX[a.id] === undefined) PIDX[a.id] = 0;
  var idx      = PIDX[a.id];
  var isLiked  = a.status === 'interested';
  var priceStr = a.price ? a.price.toLocaleString('ru') + ' ₪/мес' : '— ₪';
  var mapsUrl  = (a.lat && a.lng)
    ? 'https://www.google.com/maps?q=' + a.lat + ',' + a.lng
    : 'https://www.google.com/maps/search/' + encodeURIComponent(a.address || '');

  // Photo block
  var photoContent;
  if (photos.length) {
    photoContent =
      '<img id="pi-' + a.id + '" src="' + photos[idx] + '" referrerpolicy="no-referrer" ' +
           'onerror="imgErr(this)">';
    if (photos.length > 1) {
      photoContent +=
        '<button class="prev" onclick="navPhoto(\'' + a.id + '\',-1,event)">&#8249;</button>' +
        '<button class="next" onclick="navPhoto(\'' + a.id + '\',1,event)">&#8250;</button>' +
        '<span class="photo-counter" id="pc-' + a.id + '">' + (idx+1) + '/' + photos.length + '</span>';
    }
  } else {
    photoContent = '<div class="no-photo">🏠</div>';
  }

  // Tags
  var tags = [];
  if (a.rooms)         tags.push(a.rooms + ' комн.');
  if (a.size_sqm)      tags.push(a.size_sqm + ' м²');
  if (a.floor != null) tags.push(a.floor + ' эт.');
  if (a.mamad)         tags.push('mamad ✓');
  if (a.parking)       tags.push('parking ✓');
  if (a.furnished)     tags.push('мебель ✓');

  // Address: strip Facebook " — title" suffix
  var addr = (a.address || 'Адрес не указан').split(' — ')[0].trim();

  return '<div class="card' + (isLiked ? ' liked' : '') + '" id="c-' + a.id + '">' +
    '<div class="card-photo" onclick="lbOpen(\'' + a.id + '\',' + idx + ')">' +
      photoContent +
      '<button class="btn-like' + (isLiked ? ' liked' : '') + '" ' +
              'onclick="event.stopPropagation();toggleLike(\'' + a.id + '\')">' +
        (isLiked ? '♥' : '♡') +
      '</button>' +
      '<button class="btn-hide" ' +
              'onclick="event.stopPropagation();hideCard(\'' + a.id + '\')">' +
        '✕' +
      '</button>' +
    '</div>' +
    '<div class="card-info">' +
      '<div class="card-price">' + priceStr + '</div>' +
      '<div class="card-address">' + addr + '</div>' +
      (tags.length ? '<div class="card-tags">' + tags.join(' · ') + '</div>' : '') +
      '<div class="card-actions">' +
        '<a href="' + a.url + '" target="_blank">Объявление →</a>' +
        '<a href="' + mapsUrl + '" target="_blank">📍 Maps</a>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function imgErr(img) {
  img.style.display = 'none';
  var ph = document.createElement('div');
  ph.className = 'no-photo';
  ph.textContent = '🏠';
  img.parentNode.insertBefore(ph, img);
}

function navPhoto(id, dir, e) {
  if (e) e.stopPropagation();
  var photos = PHOTOS[id] || [];
  if (!photos.length) return;
  PIDX[id] = ((PIDX[id]||0) + dir + photos.length) % photos.length;
  var img = document.getElementById('pi-' + id);
  var ctr = document.getElementById('pc-' + id);
  if (img) img.src = photos[PIDX[id]];
  if (ctr) ctr.textContent = (PIDX[id]+1) + '/' + photos.length;
}

// ── Render gallery ────────────────────────────────────────────────────────────
function renderGallery() {
  var el   = document.getElementById('gallery-view');
  var list = filtered();
  if (!list.length) {
    el.innerHTML = '<div class="empty">Нет квартир по этому фильтру</div>';
    return;
  }
  el.innerHTML = list.map(makeCard).join('');
}

// ── Render map ────────────────────────────────────────────────────────────────
function renderMap() {
  var mapEl = document.getElementById('map');
  // Set map height to window height minus header
  var hh = document.querySelector('header').offsetHeight;
  mapEl.style.height = (window.innerHeight - hh) + 'px';

  if (!leafletMap) {
    leafletMap = L.map('map', { center: [32.075, 34.778], zoom: 13 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(leafletMap);
    markers = L.layerGroup().addTo(leafletMap);
  } else {
    leafletMap.invalidateSize();
  }

  markers.clearLayers();
  filtered().forEach(function(a) {
    if (!a.lat || !a.lng) return;
    var priceStr = a.price ? a.price.toLocaleString('ru') + ' ₪' : '?';
    var bg  = a.status === 'interested' ? '#E8341C' : '#F5E642';
    var icon = L.divIcon({
      className: '',
      html: '<div class="apt-pin" style="background:' + bg + ';color:#1A1A1A;' +
            'padding:4px 10px;border-radius:14px;font-family:Inter,sans-serif;' +
            'font-size:12px;font-weight:700;white-space:nowrap;' +
            'box-shadow:0 2px 8px rgba(0,0,0,0.25)">' + priceStr + '</div>',
      iconSize: [80,26], iconAnchor: [40,13], popupAnchor: [0,-18],
    });
    var tags = [];
    if (a.rooms)         tags.push(a.rooms + ' комн.');
    if (a.size_sqm)      tags.push(a.size_sqm + ' м²');
    if (a.mamad)         tags.push('mamad ✓');
    if (a.parking)       tags.push('parking ✓');
    var popup =
      '<div class="popup-price">' + (a.price ? a.price.toLocaleString('ru') + ' ₪/мес' : '—') + '</div>' +
      '<div class="popup-addr">'  + (a.address || '').split(' — ')[0].trim().slice(0,80) + '</div>' +
      (tags.length ? '<div class="popup-tags">' + tags.join(' · ') + '</div>' : '') +
      '<a class="popup-link" href="' + a.url + '" target="_blank">Открыть объявление →</a>';
    L.marker([a.lat, a.lng], { icon: icon })
      .addTo(markers)
      .bindPopup(popup, { maxWidth: 280 });
  });
}

// ── View switch ───────────────────────────────────────────────────────────────
function setView(v) {
  view = v;
  document.getElementById('tab-gallery').classList.toggle('active', v === 'gallery');
  document.getElementById('tab-map').classList.toggle('active', v === 'map');
  document.getElementById('gallery-view').classList.toggle('hidden', v !== 'gallery');
  document.getElementById('map-view').classList.toggle('hidden', v !== 'map');
  if (v === 'map') renderMap();
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  updateStats();
  if (view === 'gallery') renderGallery();
  else renderMap();
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function lbOpen(id, idx) {
  var photos = PHOTOS[id] || [];
  if (!photos.length) return;
  lbId  = id;
  lbIdx = idx || 0;
  lbShow();
  document.getElementById('lightbox').classList.add('open');
}
function lbShow() {
  var photos = PHOTOS[lbId] || [];
  document.getElementById('lb-img').src = photos[lbIdx] || '';
  document.getElementById('lb-counter').textContent = (lbIdx+1) + ' / ' + photos.length;
  document.getElementById('lb-img').setAttribute('referrerpolicy','no-referrer');
}
function lbNav(dir) {
  var photos = PHOTOS[lbId] || [];
  lbIdx = (lbIdx + dir + photos.length) % photos.length;
  lbShow();
}
function lbClose() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src = '';
}
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape')     lbClose();
});

// ── Status ────────────────────────────────────────────────────────────────────
function toggleLike(id) {
  var a = apts.find(function(x){ return x.id === id; });
  if (!a) return;
  var newStatus = a.status === 'interested' ? 'new' : 'interested';
  a.status = newStatus;
  showNotice('Статус → <b>' + newStatus + '</b>. Сохрани:<br>' +
    '<code>python update_status.py ' + id + ' ' + newStatus + '</code>');
  render();
}

function hideCard(id) {
  var a = apts.find(function(x){ return x.id === id; });
  if (!a) return;
  a.status = 'rejected';
  showNotice('Скрыто. Сохрани:<br><code>python update_status.py ' + id + ' rejected</code>');
  render();
}

function showNotice(html) {
  var el = document.getElementById('notice');
  el.innerHTML = html;
  el.style.display = 'block';
  clearTimeout(showNotice._t);
  showNotice._t = setTimeout(function(){ el.style.display = 'none'; }, 5000);
}

// ── Export CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  var liked = apts.filter(function(a){ return a.status === 'interested'; });
  if (!liked.length) { showNotice('Нет квартир с ♥'); return; }
  var cols = ['address','price','rooms','size_sqm','floor','mamad','parking','furnished','source','url','status'];
  var csv  = cols.join(',') + '\n' + liked.map(function(a){
    return cols.map(function(c){
      var v = a[c] == null ? '' : String(a[c]);
      return '"' + v.replace(/"/g,'""') + '"';
    }).join(',');
  }).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'apartments_liked.csv';
  a.click();
}
</script>
