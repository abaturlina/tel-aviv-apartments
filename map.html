<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ТА · Квартиры</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --yellow: #F5E642;
    --red:    #E8341C;
    --black:  #1A1A1A;
    --white:  #FFFFFF;
    --font:   'Inter', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: var(--font);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--black);
    color: var(--white);
    flex-shrink: 0;
    padding: 12px 20px 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    padding-bottom: 12px;
  }
  .logo {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--yellow);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 3px;
    flex-shrink: 0;
  }
  .mode-btn {
    padding: 6px 18px;
    border-radius: 6px;
    border: none;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: rgba(255,255,255,0.5);
  }
  .mode-btn.active             { background: var(--yellow); color: var(--black); }
  .mode-btn:not(.active):hover { color: var(--white); }

  /* Stats */
  .header-stats {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-left: auto;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }
  .stat-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  .stat-val  { color: var(--white); font-weight: 700; }
  .stat-sep  { color: rgba(255,255,255,0.2); }

  /* Filters */
  .filters {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 10px 0 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  select.filter-sel,
  input.filter-input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--white);
    padding: 5px 10px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
    height: 30px;
  }
  select.filter-sel:focus,
  input.filter-input:focus    { border-color: var(--yellow); }
  select.filter-sel option    { background: #222; color: var(--white); }
  input.filter-input::placeholder { color: rgba(255,255,255,0.25); }
  input.filter-input          { width: 80px; }

  .btn-reset {
    background: var(--red);
    border: none;
    color: var(--white);
    padding: 0 14px;
    height: 30px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-reset:hover { opacity: 0.85; }

  .btn-export {
    background: var(--yellow);
    border: none;
    color: var(--black);
    padding: 0 14px;
    height: 30px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-export:hover { opacity: 0.85; }

  /* ── Main ── */
  .main { flex: 1; overflow: hidden; }

  .gallery-view {
    height: 100%;
    overflow-y: auto;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    align-content: start;
    background: #F5F5F5;
    scrollbar-width: thin;
    scrollbar-color: #ccc transparent;
  }
  @media (max-width: 1280px) { .gallery-view { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 860px)  { .gallery-view { grid-template-columns: repeat(2, 1fr); } }
  .gallery-view.hidden { display: none; }

  .map-view { height: 100%; }
  .map-view.hidden { display: none; }
  #map { width: 100%; height: 100%; }

  /* ── Card ── */
  .card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.16);
  }
  .card.interested { outline: 2px solid var(--yellow); }

  /* ── Photo area ── */
  .card-photo {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
    background: #e0e0e0;
  }
  .card-photo img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    transition: transform 0.35s ease;
  }
  .card:hover .card-photo img { transform: scale(1.04); }

  /* No-photo placeholder */
  .card-photo .no-photo {
    width: 100%;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    opacity: 0.2;
    background: #e8e8e8;
  }

  /* Arrows */
  .card-photo .prev,
  .card-photo .next {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.92);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 20px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    opacity: 0; pointer-events: none;
    transition: opacity 0.18s;
    z-index: 3;
  }
  .card-photo .prev { left: 8px; }
  .card-photo .next { right: 8px; }
  .card:hover .card-photo .prev,
  .card:hover .card-photo .next { opacity: 1; pointer-events: all; }

  /* Counter */
  .photo-counter {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
    pointer-events: none;
    z-index: 3;
  }

  /* ♥ / ✕ */
  .btn-like,
  .btn-hide {
    position: absolute;
    top: 8px;
    width: 32px; height: 32px;
    border: none; border-radius: 50%;
    background: rgba(255,255,255,0.92);
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    transition: transform 0.12s, background 0.12s;
    z-index: 4;
  }
  .btn-like { right: 46px; }
  .btn-hide { right: 8px; }
  .btn-like.active  { background: var(--yellow); color: var(--black); }
  .btn-hide:hover   { background: #fee2e2; color: var(--red); }

  /* ── Card info ── */
  .card-info {
    padding: 12px;
    background: white;
    color: #1A1A1A;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }
  .card-price {
    font-size: 18px; font-weight: 800;
    color: #1A1A1A; line-height: 1.2;
  }
  .card-address {
    font-size: 13px; color: #333;
    line-height: 1.4;
  }
  .card-tags {
    font-size: 12px; color: #777;
  }
  .card-actions {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 4px;
  }
  .card-actions a {
    font-size: 12px; font-weight: 500;
    color: #444; text-decoration: none;
    padding: 4px 10px;
    border: 1px solid #ddd; border-radius: 6px;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  .card-actions a:hover { border-color: #999; color: #111; }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1/-1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 20px; gap: 14px; color: #aaa; text-align: center;
  }
  .empty-state .empty-icon { font-size: 52px; }
  .empty-state p { font-size: 14px; line-height: 1.7; }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 9000;
    background: rgba(0,0,0,0.93);
    align-items: center;
    justify-content: center;
  }
  .lightbox.open {
    display: flex;
    animation: lbFadeIn 0.18s ease;
  }
  @keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }

  .lb-inner {
    /* не перехватывает клики фона */
    pointer-events: none;
  }
  .lb-img {
    pointer-events: none;
    display: block;
    width: 90vw;
    height: 85vh;
    object-fit: contain;    /* показывать целиком, без обрезки */
    border-radius: 6px;
    animation: lbSlideIn 0.18s ease;
  }
  @keyframes lbSlideIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lb-close {
    position: fixed; top: 18px; right: 22px;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 22px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    z-index: 9002;
  }
  .lb-close:hover { background: rgba(255,255,255,0.25); }

  .lb-arrow {
    position: fixed;
    top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.25);
    color: #fff;
    width: 58px; height: 58px;
    border-radius: 50%;
    font-size: 28px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.15s;
    z-index: 9002;
    user-select: none;
  }
  .lb-arrow:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-50%) scale(1.08);
  }
  .lb-arrow-prev { left: 20px; }
  .lb-arrow-next { right: 20px; }

  .lb-counter {
    position: fixed;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 13px; font-weight: 500;
    background: rgba(0,0,0,0.55);
    padding: 4px 16px; border-radius: 12px;
    z-index: 9002; pointer-events: none;
  }

  /* ── Leaflet popup ── */
  .leaflet-popup-content-wrapper {
    background: var(--black);
    border-radius: 12px;
    border: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    padding: 0;
    min-width: 260px; max-width: 300px;
  }
  .leaflet-popup-content { margin: 0; }
  .leaflet-popup-tip     { background: var(--black); }
  .leaflet-popup-close-button {
    color: rgba(255,255,255,0.35) !important;
    font-size: 20px !important;
    top: 8px !important; right: 8px !important;
  }
  .popup-photo { position: relative; overflow: hidden; border-radius: 12px 12px 0 0; }
  .popup-photo img { width: 100%; height: 155px; object-fit: cover; display: block; }
  .popup-price-badge {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(20,20,20,0.88);
    padding: 4px 10px; border-radius: 7px;
    font-size: 15px; font-weight: 800; color: var(--yellow);
    backdrop-filter: blur(4px);
  }
  .popup-body   { padding: 12px; color: var(--white); }
  .popup-price-header { font-size: 18px; font-weight: 800; color: var(--yellow); margin-bottom: 6px; }
  .popup-addr   { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 8px; line-height: 1.45; }
  .popup-chips  { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .popup-actions { display: flex; gap: 5px; }
  .popup-btn {
    font-family: var(--font); font-size: 11px; font-weight: 600;
    padding: 6px 0; border-radius: 6px; border: none;
    cursor: pointer; text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 3px;
    transition: opacity 0.15s; flex: 1;
  }
  .popup-btn:hover          { opacity: 0.8; }
  .popup-btn-site           { background: var(--yellow); color: var(--black); }
  .popup-btn-like           { background: rgba(245,230,66,0.12); color: var(--yellow); }
  .popup-btn-like.active    { background: var(--yellow); color: var(--black); }
  .popup-btn-hide           { background: rgba(232,52,28,0.12); color: #EF9A9A; }

  /* Notice */
  .notice {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--black); color: var(--white);
    border: 1px solid rgba(245,230,66,0.25);
    padding: 12px 16px; border-radius: 10px;
    font-size: 12px; display: none; z-index: 8000;
    max-width: 380px; line-height: 1.65;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .apt-pin { cursor: pointer; transition: transform 0.1s; }
  .apt-pin:hover { transform: scale(1.08); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">TA·FLATS</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-gallery" onclick="setMode('gallery')">Галерея</button>
      <button class="mode-btn"        id="btn-map"     onclick="setMode('map')">Карта</button>
    </div>
    <div class="header-stats">
      <span class="stat-item">Всего: <span class="stat-val" id="s-total">0</span></span>
      <span class="stat-sep">·</span>
      <span class="stat-item">Средняя: <span class="stat-val" id="s-avg">—</span></span>
      <span class="stat-sep">·</span>
      <span class="stat-item">♥ <span class="stat-val" id="s-liked">0</span></span>
      <span class="stat-sep">·</span>
      <span class="stat-item" id="s-sources"></span>
      <span class="stat-item" id="s-updated" style="font-size:11px;color:rgba(255,255,255,0.22)"></span>
    </div>
  </div>
  <div class="filters">
    <select class="filter-sel" id="f-district" onchange="applyFilters()">
      <option value="">Все районы</option>
    </select>
    <select class="filter-sel" id="f-rooms" onchange="applyFilters()">
      <option value="">Все комнаты</option>
      <option value="2">2 комн.</option>
      <option value="3">3 комн.</option>
      <option value="4">4 комн.</option>
      <option value="5">5 комн.</option>
    </select>
    <input class="filter-input" type="number" id="f-price-max" placeholder="Цена до" oninput="applyFilters()">
    <input class="filter-input" type="number" id="f-sqm-min"   placeholder="м² от"   oninput="applyFilters()">
    <input class="filter-input" type="number" id="f-sqm-max"   placeholder="м² до"   oninput="applyFilters()">
    <select class="filter-sel" id="f-status" onchange="applyFilters()">
      <option value="">Все статусы</option>
      <option value="good">До 10k ₪</option>
      <option value="over_budget">10–15k ₪</option>
      <option value="new">Новые</option>
      <option value="interested">Понравилось</option>
      <option value="contacted">Связался</option>
    </select>
    <select class="filter-sel" id="f-source" onchange="applyFilters()">
      <option value="">Все источники</option>
      <option value="yad2">yad2</option>
      <option value="homeless">homeless</option>
      <option value="madlan">madlan</option>
      <option value="onmap">onmap</option>
      <option value="craigslist">craigslist</option>
      <option value="janglo">janglo</option>
      <option value="facebook">facebook</option>
    </select>
    <select class="filter-sel" id="f-sort" onchange="applyFilters()">
      <option value="date">По дате ↓</option>
      <option value="price_asc">Цена ↑</option>
      <option value="price_desc">Цена ↓</option>
      <option value="sqm">м² ↓</option>
      <option value="sea">Море ↑</option>
    </select>
    <button class="btn-reset" onclick="resetFilters()">Сбросить</button>
    <button class="btn-export" onclick="exportCSV()">↓ Экспорт CSV</button>
  </div>
</header>

<div class="main">
  <div class="gallery-view" id="gallery-view"></div>
  <div class="map-view hidden" id="map-view"><div id="map"></div></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="lbClickOverlay(event)">
  <div class="lb-inner">
    <img class="lb-img" id="lb-img" src="" alt="">
  </div>
  <button class="lb-close"      onclick="lbClose()"        title="Закрыть (Esc)">✕</button>
  <button class="lb-arrow lb-arrow-prev" onclick="lbNav(-1)" title="Назад">‹</button>
  <button class="lb-arrow lb-arrow-next" onclick="lbNav(1)"  title="Вперёд">›</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<div class="notice" id="notice"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
var apts        = [];
var mode        = 'gallery';
var APT_PHOTOS  = {};
var PHOTO_IDX   = {};
var leafletMap  = null;
var markerLayer = null;

// ─── Lightbox state ───────────────────────────────────────────────────────────
var lbPhotos  = [];
var lbIdx     = 0;
var lbAptId   = null;

function lbOpen(aptId, startIdx) {
  var photos = APT_PHOTOS[aptId] || [];
  if (!photos.length) return;
  lbPhotos = photos;
  lbAptId  = aptId;
  lbIdx    = startIdx || PHOTO_IDX[aptId] || 0;
  lbShow();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function lbShow() {
  var img = document.getElementById('lb-img');
  img.src = lbPhotos[lbIdx];
  img.referrerPolicy = 'no-referrer';
  document.getElementById('lb-counter').textContent = (lbIdx + 1) + ' / ' + lbPhotos.length;
}

function lbNav(dir) {
  lbIdx = (lbIdx + dir + lbPhotos.length) % lbPhotos.length;
  // Animate fade
  var img = document.getElementById('lb-img');
  img.style.opacity = '0';
  img.style.transform = 'scale(0.97)';
  img.style.transition = 'opacity 0.12s, transform 0.12s';
  setTimeout(function() {
    lbShow();
    img.style.opacity = '1';
    img.style.transform = 'scale(1)';
  }, 120);
}

function lbClose() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  // Sync gallery counter with lightbox position
  if (lbAptId !== null) {
    PHOTO_IDX[lbAptId] = lbIdx;
    var img = document.getElementById('gi-' + lbAptId);
    var ctr = document.getElementById('gn-' + lbAptId);
    if (img) img.src = lbPhotos[lbIdx];
    if (ctr) ctr.textContent = (lbIdx + 1) + '/' + lbPhotos.length;
  }
}

function lbClickOverlay(e) {
  // Close only if clicking the dark backdrop (not the image or buttons)
  if (e.target.id === 'lightbox') lbClose();
}

document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape' || e.key === 'Esc') lbClose();
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

// ─── Sea distance ─────────────────────────────────────────────────────────────
var COAST_PTS = [
  [32.100,34.764],[32.090,34.764],[32.083,34.766],
  [32.076,34.765],[32.068,34.762],[32.060,34.757],[32.054,34.753],
];

function haversine(la1, lo1, la2, lo2) {
  var R = 6371000, r = Math.PI / 180;
  var dLa = (la2-la1)*r, dLo = (lo2-lo1)*r;
  var a = Math.sin(dLa/2)*Math.sin(dLa/2) +
          Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return Math.round(2*R*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function seaDist(lat, lng) {
  if (!lat || !lng) return null;
  return Math.min.apply(null, COAST_PTS.map(function(p){ return haversine(lat,lng,p[0],p[1]); }));
}

function seaLabel(m) {
  if (m === null) return null;
  return m < 1000 ? m + 'm' : (m/1000).toFixed(1) + 'km';
}

// ─── Mode ─────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-gallery').classList.toggle('active', m === 'gallery');
  document.getElementById('btn-map').classList.toggle('active', m === 'map');
  document.getElementById('gallery-view').classList.toggle('hidden', m !== 'gallery');
  document.getElementById('map-view').classList.toggle('hidden', m !== 'map');
  if (m === 'map') {
    initMap();
    renderMarkers();
    setTimeout(function() { leafletMap && leafletMap.invalidateSize(); }, 60);
  }
}

// ─── Map ──────────────────────────────────────────────────────────────────────
function initMap() {
  if (leafletMap) return;
  leafletMap = L.map('map', { center: [32.075, 34.778], zoom: 13, zoomControl: false });
  L.control.zoom({ position: 'bottomright' }).addTo(leafletMap);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(leafletMap);
  L.polygon([
    [32.104,34.763],[32.098,34.762],[32.090,34.765],[32.083,34.766],
    [32.076,34.765],[32.068,34.761],[32.060,34.756],[32.053,34.752],
    [32.053,34.774],[32.060,34.778],[32.068,34.783],[32.076,34.787],
    [32.083,34.788],[32.090,34.787],[32.098,34.784],[32.104,34.785],
  ], {
    color:'#F5E642', fillColor:'#F5E642',
    fillOpacity:0.06, weight:1.5, opacity:0.28, dashArray:'5 5',
  }).addTo(leafletMap).bindTooltip('2 км от моря', { sticky:true });
  markerLayer = L.layerGroup().addTo(leafletMap);
}

// ─── Data ─────────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    apts = await (await fetch('apartments.json?' + Date.now())).json();
    buildDistrictOptions();
    render();
  } catch(e) {
    document.getElementById('gallery-view').innerHTML =
      '<div class="empty-state"><div class="empty-icon">📭</div>' +
      '<p>apartments.json не найден<br>Запусти scraper.py</p></div>';
  }
}

function buildDistrictOptions() {
  var sel = document.getElementById('f-district');
  while (sel.options.length > 1) sel.remove(1);
  var seen = {};
  apts.forEach(function(a) {
    if (!a.address) return;
    var parts = a.address.split(',').map(function(p){ return p.trim(); }).filter(Boolean);
    var dist = parts.length >= 2 ? parts[parts.length - 2] : null;
    if (dist && dist.length < 40 && !seen[dist]) {
      seen[dist] = true;
      var o = document.createElement('option');
      o.value = dist; o.textContent = dist;
      sel.appendChild(o);
    }
  });
  var opts = Array.from(sel.options).slice(1).sort(function(a,b){ return a.text.localeCompare(b.text); });
  opts.forEach(function(o){ sel.appendChild(o); });
}

// ─── Filters ──────────────────────────────────────────────────────────────────
function getFilters() {
  return {
    district: document.getElementById('f-district').value,
    rooms:    document.getElementById('f-rooms').value,
    priceMax: +document.getElementById('f-price-max').value || null,
    sqmMin:   +document.getElementById('f-sqm-min').value  || null,
    sqmMax:   +document.getElementById('f-sqm-max').value  || null,
    status:   document.getElementById('f-status').value,
    source:   document.getElementById('f-source').value,
    sort:     document.getElementById('f-sort').value,
  };
}

function resetFilters() {
  ['f-district','f-rooms','f-status','f-source'].forEach(function(id){
    document.getElementById(id).value = '';
  });
  ['f-price-max','f-sqm-min','f-sqm-max'].forEach(function(id){
    document.getElementById(id).value = '';
  });
  document.getElementById('f-sort').value = 'date';
  applyFilters();
}

function applyFilters() { render(); }

function filtered() {
  var f = getFilters();
  var list = apts.filter(function(a) {
    if (a.status === 'rejected') return false;
    if (f.district && !(a.address||'').includes(f.district)) return false;
    if (f.rooms    && a.rooms != +f.rooms) return false;
    if (f.priceMax && a.price > f.priceMax) return false;
    if (f.sqmMin   && (a.size_sqm == null || a.size_sqm < f.sqmMin)) return false;
    if (f.sqmMax   && (a.size_sqm == null || a.size_sqm > f.sqmMax)) return false;
    if (f.status   && a.status !== f.status) return false;
    if (f.source   && a.source !== f.source) return false;
    return true;
  });
  if      (f.sort === 'price_asc')  list.sort(function(a,b){ return (a.price||99999)-(b.price||99999); });
  else if (f.sort === 'price_desc') list.sort(function(a,b){ return (b.price||0)-(a.price||0); });
  else if (f.sort === 'sqm')        list.sort(function(a,b){ return (b.size_sqm||0)-(a.size_sqm||0); });
  else if (f.sort === 'sea')        list.sort(function(a,b){
    return (seaDist(a.lat,a.lng)||99999)-(seaDist(b.lat,b.lng)||99999);
  });
  else list.sort(function(a,b){ return (b.added_at||'')>(a.added_at||'')?1:-1; });
  return list;
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats() {
  var vis    = filtered();
  var liked  = apts.filter(function(a){ return a.status==='interested'; }).length;
  var prices = vis.filter(function(a){ return a.price; }).map(function(a){ return a.price; });
  var avg    = prices.length
    ? Math.round(prices.reduce(function(s,p){ return s+p; }, 0) / prices.length) : null;
  var src = {};
  apts.forEach(function(a){ if(a.source) src[a.source]=(src[a.source]||0)+1; });

  document.getElementById('s-total').textContent = vis.length;
  document.getElementById('s-avg').textContent   = avg ? avg.toLocaleString('ru')+' ₪' : '—';
  document.getElementById('s-liked').textContent = liked;
  document.getElementById('s-sources').innerHTML = Object.entries(src)
    .map(function(e){ return e[0]+' <strong style="color:#fff">'+e[1]+'</strong>'; })
    .join('<span style="color:rgba(255,255,255,0.2);margin:0 3px">·</span>');
}

// ─── Gallery ──────────────────────────────────────────────────────────────────
function photoError(id) {
  var img = document.getElementById('gi-' + id);
  if (!img) return;
  img.style.cssText = 'width:100%;height:220px;background:#e8e8e8;display:flex;align-items:center;justify-content:center';
  img.src = '';
  img.outerHTML = '<div class="no-photo">🏠</div>';
}

function galleryNav(aptId, dir, e) {
  if (e) e.stopPropagation();
  var photos = APT_PHOTOS[aptId] || [];
  if (!photos.length) return;
  PHOTO_IDX[aptId] = ((PHOTO_IDX[aptId] || 0) + dir + photos.length) % photos.length;
  var img = document.getElementById('gi-' + aptId);
  var ctr = document.getElementById('gn-' + aptId);
  if (img) img.src = photos[PHOTO_IDX[aptId]];
  if (ctr) ctr.textContent = (PHOTO_IDX[aptId] + 1) + '/' + photos.length;
}

function ppsqm(apt) {
  return (!apt.price || !apt.size_sqm) ? null : Math.round(apt.price / apt.size_sqm);
}

function buildCard(apt) {
  var photos  = apt.photos || [];
  APT_PHOTOS[apt.id] = photos;
  if (PHOTO_IDX[apt.id] === undefined) PHOTO_IDX[apt.id] = 0;
  var idx     = PHOTO_IDX[apt.id];
  var isLiked = apt.status === 'interested';
  var price   = apt.price;
  var priceStr = price ? price.toLocaleString('ru') + ' ₪/мес' : '— ₪';
  var mapsUrl = (apt.lat && apt.lng)
    ? 'https://www.google.com/maps?q=' + apt.lat + ',' + apt.lng
    : 'https://www.google.com/maps/search/' + encodeURIComponent(apt.address || '');

  // Photo area
  var imgHtml;
  if (photos.length) {
    imgHtml =
      '<img id="gi-' + apt.id + '"' +
           ' src="' + photos[idx] + '"' +
           ' style="width:100%;height:220px;object-fit:cover;display:block"' +
           ' loading="lazy" referrerpolicy="no-referrer"' +
           ' onerror="photoError(\'' + apt.id + '\')">';
  } else {
    imgHtml = '<div class="no-photo">🏠</div>';
  }

  var prevBtn = photos.length > 1
    ? '<button class="prev" onclick="galleryNav(\'' + apt.id + '\',-1,event)">&#8249;</button>'
    : '';
  var nextBtn = photos.length > 1
    ? '<button class="next" onclick="galleryNav(\'' + apt.id + '\',1,event)">&#8250;</button>'
    : '';
  var counter = photos.length > 1
    ? '<span class="photo-counter" id="gn-' + apt.id + '">' + (idx + 1) + '/' + photos.length + '</span>'
    : '';

  var likeBtn =
    '<button class="btn-like' + (isLiked ? ' active' : '') + '"' +
            ' onclick="event.stopPropagation();markStatus(\'' + apt.id + '\',\'' + (isLiked ? 'new' : 'interested') + '\')">' +
      (isLiked ? '&#9829;' : '&#9825;') +
    '</button>';
  var hideBtn =
    '<button class="btn-hide"' +
            ' onclick="event.stopPropagation();markStatus(\'' + apt.id + '\',\'rejected\')">&#x2715;</button>';

  // Address — strip " — title" suffix added for Facebook entries
  var addrFull = (apt.address || 'Адрес не указан').split(' — ')[0].trim();

  // Tags row
  var tags = [];
  if (apt.rooms)         tags.push(apt.rooms + ' комн.');
  if (apt.size_sqm)      tags.push(apt.size_sqm + ' м²');
  if (apt.floor != null) tags.push(apt.floor + ' эт.');
  if (apt.mamad)         tags.push('mamad ✓');
  if (apt.parking)       tags.push('parking ✓');
  if (apt.furnished)     tags.push('мебель ✓');
  var sea = seaDist(apt.lat, apt.lng);
  var seaStr = seaLabel(sea);
  if (seaStr) tags.push('🌊 ' + seaStr);

  return (
    '<div class="card' + (isLiked ? ' interested' : '') + '" id="card-' + apt.id + '">' +
      '<div class="card-photo" onclick="lbOpen(\'' + apt.id + '\',' + idx + ')">' +
        imgHtml +
        prevBtn + nextBtn + counter +
        likeBtn + hideBtn +
      '</div>' +
      '<div class="card-info">' +
        '<div class="card-price">' + priceStr + '</div>' +
        '<div class="card-address">' + addrFull + '</div>' +
        (tags.length ? '<div class="card-tags">' + tags.join(' · ') + '</div>' : '') +
        '<div class="card-actions">' +
          '<a href="' + apt.url + '" target="_blank">Объявление &#8594;</a>' +
          '<a href="' + mapsUrl + '" target="_blank">&#128205; Maps</a>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function renderGallery() {
  var el = document.getElementById('gallery-view');
  var vs = filtered();
  if (!vs.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div>' +
                   '<p>Нет квартир по этому фильтру</p></div>';
    return;
  }
  el.innerHTML = vs.map(buildCard).join('');
}

// ─── Map markers ──────────────────────────────────────────────────────────────
function renderMarkers() {
  if (!leafletMap || !markerLayer) return;
  markerLayer.clearLayers();
  filtered().forEach(function(a) {
    if (!a.lat || !a.lng) return;
    var priceStr = a.price ? a.price.toLocaleString('ru')+' ₪' : '?';
    var bg = a.status === 'interested' ? '#E8341C' : '#F5E642';
    var icon = L.divIcon({
      className: '',
      html: '<div class="apt-pin" style="background:'+bg+';color:#1A1A1A;' +
            'padding:4px 11px;border-radius:16px;' +
            'font-family:Inter,system-ui,sans-serif;font-size:12px;font-weight:700;' +
            'white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.25);' +
            'border:2px solid rgba(0,0,0,0.08)">'+priceStr+'</div>',
      iconSize: [90,26], iconAnchor: [45,13], popupAnchor: [0,-18],
    });
    L.marker([a.lat, a.lng], { icon: icon })
      .addTo(markerLayer)
      .bindPopup(function(){ return buildPopup(a); }, { maxWidth: 300 });
  });
}

function buildPopup(a) {
  var photos   = a.photos || [];
  var priceStr = a.price ? a.price.toLocaleString('ru')+' ₪/мес' : '—';
  var sea      = seaDist(a.lat, a.lng);
  var seaStr   = seaLabel(sea);
  var sqm      = ppsqm(a);
  var isLiked  = a.status === 'interested';

  var chips = [
    a.rooms    ? '<span class="chip chip-rooms">'+a.rooms+' комн.</span>' : '',
    a.size_sqm ? '<span class="chip chip-sqm">'+a.size_sqm+' м²</span>'   : '',
    a.floor != null ? '<span class="chip chip-floor">'+a.floor+' эт.</span>' : '',
    a.mamad    ? '<span class="chip chip-mamad">mamad ✓</span>' : '',
    a.parking  ? '<span class="chip chip-park">parking</span>' : '',
    seaStr     ? '<span class="chip chip-sea">🌊 '+seaStr+'</span>' : '',
    sqm        ? '<span class="chip chip-sqm">'+sqm.toLocaleString('ru')+' ₪/м²</span>' : '',
  ].filter(Boolean).join('');

  var photoHtml = photos.length
    ? '<div class="popup-photo">' +
        '<img src="'+photos[0]+'" alt="фото" referrerpolicy="no-referrer">' +
        '<div class="popup-price-badge">'+priceStr+'</div>' +
      '</div>'
    : '';

  return photoHtml +
    '<div class="popup-body">' +
      (!photos.length ? '<div class="popup-price-header">'+priceStr+'</div>' : '') +
      '<div class="popup-addr">'+(a.address||'—')+'</div>' +
      '<div class="popup-chips">'+chips+'</div>' +
      '<div class="popup-actions">' +
        '<a href="'+a.url+'" target="_blank" class="popup-btn popup-btn-site">↗</a>' +
        '<button class="popup-btn popup-btn-like'+(isLiked?' active':'')+'"' +
                ' onclick="markStatus(\''+a.id+'\',\''+(isLiked?'new':'interested')+'\')">' +
          (isLiked?'♥':'♡') +
        '</button>' +
        '<button class="popup-btn popup-btn-hide" onclick="markStatus(\''+a.id+'\',\'rejected\')">✕</button>' +
      '</div>' +
    '</div>';
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  updateStats();
  if (mode === 'gallery') renderGallery();
  else                    renderMarkers();
  var latest = apts.map(function(a){ return a.added_at; }).filter(Boolean).sort().pop();
  if (latest) {
    var d = new Date(latest);
    document.getElementById('s-updated').textContent =
      'обновлено ' + d.toLocaleDateString('ru') + ' ' +
      d.toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' });
  }
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function markStatus(id, status) {
  var a = apts.find(function(x){ return x.id === id; });
  if (!a) return;
  a.status = status;
  render();
  showNotice('Статус → <strong>'+status+'</strong>.<br>' +
    'Для сохранения: <code style="font-size:10px;color:#aaa">' +
    'python update_status.py '+id+' '+status+'</code>');
}

function exportCSV() {
  var liked = apts.filter(function(a){ return a.status === 'interested'; });
  if (!liked.length) { showNotice('Нет понравившихся квартир.'); return; }
  var headers = ['address','price','rooms','size_sqm','floor','mamad','parking','furnished','source','url','status','added_at'];
  var rows = liked.map(function(a) {
    return headers.map(function(h) {
      var v = a[h];
      if (v == null) return '';
      if (typeof v === 'string' && (v.includes(',') || v.includes('"')))
        return '"'+v.replace(/"/g,'""')+'"';
      return v;
    }).join(',');
  });
  var csv  = [headers.join(',')].concat(rows).join('\n');
  var blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' });
  var link = document.createElement('a');
  link.href     = URL.createObjectURL(blob);
  link.download = 'apartments_liked_'+new Date().toISOString().slice(0,10)+'.csv';
  link.click();
  showNotice('Экспортировано '+liked.length+' квартир в CSV.');
}

function showNotice(html) {
  var el = document.getElementById('notice');
  el.innerHTML = html;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.style.display='none'; }, 8000);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadData();

setInterval(function() {
  fetch('apartments.json?'+Date.now())
    .then(function(r){ return r.json(); })
    .then(function(fresh) {
      if (fresh.length !== apts.length) {
        apts = fresh; buildDistrictOptions(); render();
      }
    }).catch(function(){});
}, 30000);
</script>
